<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glitch Cam Pro - Hallucination V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #startBtn { padding: 15px 40px; font-size: 20px; border-radius: 30px; border: 2px solid #fff; background: transparent; color: #fff; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        
        #glitchCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        video { display: none; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0; }
        
        .top-bar { display: flex; justify-content: flex-end; padding: 0 20px; pointer-events: auto; }
        #settingsBtn { background: rgba(0,0,0,0.5); border: none; font-size: 24px; padding: 10px; border-radius: 50%; cursor: pointer; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .bottom-bar { display: flex; flex-direction: column; align-items: center; pointer-events: auto; padding-bottom: 20px; }
        
        .layer-controls { display: flex; gap: 15px; margin-bottom: 25px; }
        .layer-btn { width: 60px; height: 60px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.4); color: #888; text-align: center; }
        .layer-btn.active { border-color: #0f0; color: #0f0; background: rgba(0, 255, 0, 0.1); box-shadow: 0 0 10px rgba(0,255,0,0.3); }

        .shutter-btn { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-btn-inner { width: 50px; height: 50px; border-radius: 50%; background: #fff; transition: 0.1s; }
        .shutter-btn:active .shutter-btn-inner { transform: scale(0.9); background: #ddd; }
        
        #flash { position: absolute; top:0; left:0; width: 100%; height: 100%; background: white; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.1s; }

        #settingsPanel { position: absolute; top: 0; right: -100%; width: 250px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; transition: right 0.3s ease; padding: 20px; pointer-events: auto; }
        #settingsPanel.open { right: 0; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #closeSettings { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .slider-group { margin-bottom: 25px; }
        .slider-group label { display: block; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; color: #aaa; }
        input[type=range] { width: 100%; accent-color: #fff; }
    </style>
</head>
<body>

    <div id="startScreen">
        <button id="startBtn">Iniciar Câmara</button>
    </div>

    <video id="videoElement" autoplay playsinline></video>
    <canvas id="glitchCanvas"></canvas>
    <div id="flash"></div>

    <div class="ui-layer" id="uiLayer" style="display:none;">
        <div class="top-bar">
            <button id="settingsBtn">⚙️</button>
        </div>

        <div class="bottom-bar">
            <div class="layer-controls">
                <div class="layer-btn active" id="btn-rgb" onclick="toggleLayer('rgb', this)">RGB<br>Shift</div>
                <div class="layer-btn active" id="btn-toxic" onclick="toggleLayer('toxic', this)">Toxic<br>Color</div>
                <div class="layer-btn active" id="btn-tear" onclick="toggleLayer('tear', this)">Tear<br>Frag</div>
            </div>
            
            <div class="shutter-btn" id="shutterBtn">
                <div class="shutter-btn-inner"></div>
            </div>
        </div>
    </div>

    <div id="settingsPanel">
        <div class="settings-header">
            <h3>Definições</h3>
            <button id="closeSettings">✕</button>
        </div>
        <div class="slider-group"><label>Intensidade Total</label><input type="range" id="glitchSlider" min="0" max="100" value="80"></div>
        <div class="slider-group"><label>Grão Anos 30</label><input type="range" id="grainSlider" min="0" max="100" value="40"></div>
        <div class="slider-group"><label>VHS Lines</label><input type="range" id="vhsSlider" min="0" max="100" value="60"></div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const startBtn = document.getElementById('startBtn');
        const startScreen = document.getElementById('startScreen');
        const uiLayer = document.getElementById('uiLayer');
        const shutterBtn = document.getElementById('shutterBtn');
        const flashScreen = document.getElementById('flash');
        const settingsPanel = document.getElementById('settingsPanel');
        
        let layers = { rgb: true, toxic: true, tear: true };
        let scanY = 0;
        let organicScanTimer = 0;
        let verticalLines = [];

        document.getElementById('settingsBtn').addEventListener('click', () => settingsPanel.classList.add('open'));
        document.getElementById('closeSettings').addEventListener('click', () => settingsPanel.classList.remove('open'));

        function toggleLayer(layerName, element) {
            layers[layerName] = !layers[layerName];
            if (layers[layerName]) {
                element.classList.add('active');
            } else {
                element.classList.remove('active');
            }
        }

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    startScreen.style.display = 'none';
                    uiLayer.style.display = 'flex';
                    video.onloadedmetadata = () => {
                        resizeCanvas();
                        applyGlitch();
                    };
                }).catch(err => alert("Erro na câmara: " + err));
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reiniciar linhas verticais ao redimensionar
            verticalLines = [];
            for(let i=0; i<20; i++) {
                let thickness = Math.random() * 30 + 1;
                verticalLines.push({
                    x: Math.random() * canvas.width,
                    thickness: thickness,
                    speed: 20 / thickness, // Mais espessa = mais lenta
                    color: randomColor()
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);

        shutterBtn.addEventListener('click', () => {
            flashScreen.style.opacity = 1;
            setTimeout(() => { flashScreen.style.opacity = 0; }, 150);
            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `glitch_hallucination_${Date.now()}.jpg`;
            link.href = dataURL;
            link.click();
        });

        function drawVideoCover() {
            const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
            const x = (canvas.width / 2) - (video.videoWidth / 2) * scale;
            const y = (canvas.height / 2) - (video.videoHeight / 2) * scale;
            ctx.drawImage(video, x, y, video.videoWidth * scale, video.videoHeight * scale);
        }

        function randomColor() {
            const colors = ['#00FF00', '#00FFFF', '#FF0000', '#0000FF', '#FFFFFF', '#FFFF00']; // Mais foco em G, B, R puro
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function applyGlitch() {
            let glitchVal = document.getElementById('glitchSlider').value / 100;
            let grainVal = document.getElementById('grainSlider').value / 100;
            let vhsVal = document.getElementById('vhsSlider').value / 100;

            // FEEDBACK LOOP
            ctx.globalAlpha = 0.85; 
            if (Math.random() > 0.75) {
                ctx.drawImage(canvas, -8, -8, canvas.width + 16, canvas.height + 16);
            }
            ctx.globalAlpha = 1.0;
            
            if (Math.random() > 0.25) {
                drawVideoCover();
            }

            // PIXEL MANIPULATION (RGB e TOXIC)
            if (layers.rgb || layers.toxic) {
                let frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = frameData.data;

                // 1. RGB SHIFT
                if (layers.rgb) {
                    let shiftAmount = Math.floor(glitchVal * 40) * 4;
                    for (let i = 0; i < data.length; i += 12) { 
                        if (i + shiftAmount < data.length) {
                            data[i] = data[i + shiftAmount];
                        }
                    }
                } 
                
                // 2. TOXIC CORRUPTION - Ajustado para menos rosa
                if (layers.toxic) {
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = (data[i] + (data[i + 1] * glitchVal)) % 255; // R influenciado por G
                        data[i + 1] = 255 - data[i + 1]; // Inverter G
                        data[i + 2] = (data[i + 2] * 1.8) % 255; // Intensificar B
                    }
                }
                ctx.putImageData(frameData, 0, 0);
            }

            // TEAR FRAG
            if (layers.tear && glitchVal > 0) {
                const numSlices = Math.floor(Math.random() * 25 * glitchVal);
                for (let i = 0; i < numSlices; i++) {
                    const sliceY = Math.random() * canvas.height;
                    const sliceHeight = Math.random() * 40;
                    const xOffset = (Math.random() - 0.5) * 150 * glitchVal;
                    ctx.drawImage(canvas, 0, sliceY, canvas.width, sliceHeight, xOffset, sliceY, canvas.width, sliceHeight);
                }
            }

            // ALUCINAÇÕES V2
            
            // 1. Mais Linhas Verticais Dinâmicas (Espessas = Lentas)
            ctx.globalCompositeOperation = 'difference';
            verticalLines.forEach(line => {
                line.x += line.speed * (glitchVal * 2);
                if(line.x > canvas.width) line.x = -line.thickness;
                
                ctx.fillStyle = line.color;
                ctx.fillRect(line.x, 0, line.thickness, canvas.height);
            });
            ctx.globalCompositeOperation = 'source-over';

            // 2. Scans Orgânicos de Cores (G, B, R)
            organicScanTimer++;
            if(Math.random() < 0.15 * glitchVal && organicScanTimer > 10) {
                let scanColor = randomColor();
                if(scanColor !== '#FFFFFF') { // Evitar scans brancos orgânicos
                    ctx.fillStyle = scanColor;
                    ctx.globalAlpha = 0.5 * glitchVal;
                    ctx.beginPath();
                    let rx = Math.random() * canvas.width;
                    let ry = Math.random() * canvas.height;
                    let rw = 100 + Math.random() * 300;
                    let rh = 100 + Math.random() * 400;
                    ctx.ellipse(rx, ry, rw, rh, Math.random()*Math.PI, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
                organicScanTimer = 0;
            }

            // 3. Mais Píxeis Mortos (Pretos e Coloridos)
            for(let p = 0; p < 300 * glitchVal; p++) {
                ctx.fillStyle = Math.random() > 0.8 ? randomColor() : '#000';
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
            }

            // 4. Mais Grupos de Píxeis Deslocados
            if (Math.random() < 0.6 * glitchVal) {
                let sx = Math.random() * canvas.width;
                let sy = Math.random() * canvas.height;
                let dim = 50 + Math.random() * 150;
                ctx.globalCompositeOperation = 'lighter';
                ctx.drawImage(canvas, sx, sy, dim, dim, sx + (Math.random()-0.5)*80, sy + (Math.random()-0.5)*80, dim, dim);
                ctx.globalCompositeOperation = 'source-over';
            }

            // 5. Scan Aleatório de Linha (VHS/TV)
            scanY += 18 + (Math.random() * 25);
            if (scanY > canvas.height) scanY = 0;
            if (glitchVal > 0.1) {
                ctx.globalCompositeOperation = 'exclusion';
                ctx.drawImage(canvas, 0, scanY, canvas.width, 60, (Math.random()-0.5)*30, scanY, canvas.width, 60);
                ctx.globalCompositeOperation = 'source-over';
            }

            // 6. Retângulos com Noise Dinâmico Berrante
            if (Math.random() < 0.25 * glitchVal) {
                let rw = 80 + Math.random() * 200;
                let rh = 80 + Math.random() * 120;
                let rx = Math.random() * canvas.width;
                let ry = Math.random() * canvas.height;
                ctx.drawImage(canvas, rx, ry, rw, rh, Math.random() * canvas.width, Math.random() * canvas.height, rw, rh);
                ctx.fillStyle = randomColor();
                ctx.globalCompositeOperation = 'overlay';
                ctx.fillRect(rx, ry, rw, rh);
                ctx.globalCompositeOperation = 'source-over';
            }

            // GRÃO E VHS
            if (grainVal > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${grainVal * 0.15})`;
                for (let i = 0; i < 80; i++) {
                    ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
                }
            }
            if (vhsVal > 0) {
                ctx.fillStyle = `rgba(0, 0, 0, ${vhsVal * 0.25})`;
                for (let y = 0; y < canvas.height; y += 3) {
                    ctx.fillRect(0, y, canvas.width, 1);
                }
            }

            requestAnimationFrame(applyGlitch);
        }
    </script>
</body>
</html>
